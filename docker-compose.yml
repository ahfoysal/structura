services:
  postgres:
    image: postgres:16-alpine
    container_name: tiered-data-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: tiered_data
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d tiered_data"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
